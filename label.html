<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>TPN Master Print | Srinagarind Hospital</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    /* ตั้งค่าพื้นฐานและแก้ปัญหาสระหาย */
    * { font-family: 'Sarabun', sans-serif; color: #000; line-height: 1.2; font-weight: 700; }
    
    @media print {
      @page { margin: 0; size: auto; }
      body { background: #fff !important; margin: 0; padding: 0; }
      .no-print { display: none !important; }
      .print-area:not(.active) { display: none !important; }
      .sticker { 
        box-shadow: none !important; border: none !important; 
        margin: 3mm auto 0 auto !important; page-break-after: always;
        overflow: hidden; 
        background: #fff !important;
      }
    }

    .sticker-pn { 
      width: 9.1cm; height: 12.9cm; padding: 1.45cm 0.3cm 0.5cm 0.3cm; 
      box-sizing: border-box; background: #fff !important; position: relative; display: flex; flex-direction: column;
    }

    .pn-table { width: 100%; border-collapse: collapse; border: 2px solid #000; table-layout: fixed; background: #fff !important; }
    .pn-table td { border: 1px solid #000; vertical-align: middle; word-wrap: break-word; background: #fff !important; }
    .pn-table th { border: 2px solid #000; padding: 4px; font-size: 14px; background: #fff !important; }

    .large-mode .pn-table td { padding: 8px 6px; font-size: 18px; }
    .large-mode .header-info { font-size: 16px; padding-bottom: 2px; }

    .compact-mode .pn-table td { padding: 2px 6px; font-size: 14.5px; }
    .compact-mode .header-info { font-size: 14px; padding-bottom: 2px; }
    /* ขยายพื้นที่ตารางเพิ่มขึ้นอีกนิดเพื่อไม่ให้ Total Volume หาย */
    .compact-mode .table-container { max-height: 7.8cm; overflow: hidden; }

    .header-info { border-bottom: 2.5px solid #000; margin-bottom: 4px; }
    
    .footer-container { 
      position: absolute; bottom: 1.05cm; left: 0.3cm; right: 0.3cm;
      border-top: 2px solid #000; padding-top: 6px; display: grid; grid-template-columns: 1fr 1fr;
      background: #fff !important;
    }
    
    .rate-box { border: 2.5px solid #000; padding: 2px 8px; font-size: 18px; font-weight: 900; background: #fff !important; }
    .exp-text { font-size: 11px; text-align: right; line-height: 1.2; margin-top: 2px; }
    .energy-text { font-size: 15px; align-self: start; }

    [contenteditable="true"]:hover { background: #fff9c4; outline: 1px dashed #ccc; cursor: text; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">

  <div class="max-w-xl mx-auto py-8 no-print text-center">
    <h1 class="text-2xl font-black text-emerald-900 mb-6 uppercase tracking-tighter">🖨️ เลือกสั่งพิมพ์</h1>
    <div class="grid grid-cols-2 gap-4 mb-8">
      <div id="card-pn" onclick="selectSection('pn')" class="bg-white p-6 rounded-3xl border-4 border-emerald-100 cursor-pointer shadow-sm hover:scale-105 transition-transform">
        <div class="text-3xl mb-2">📄</div>
        <h3 class="font-black text-lg text-emerald-900">TPN Label</h3>
        <p id="mode-hint" class="text-[10px] text-emerald-600 font-bold mt-1 uppercase"></p>
      </div>
      <div id="card-bag" onclick="selectSection('bag')" class="bg-white p-6 rounded-3xl border-4 border-emerald-100 cursor-pointer shadow-sm hover:scale-105 transition-transform">
        <div class="text-3xl mb-2">🏷️</div>
        <h3 class="font-black text-lg text-emerald-900">ฉลากหน้าถุง</h3>
      </div>
    </div>
    <div id="action-btns">
      <button onclick="window.print()" class="bg-slate-900 text-white py-5 px-14 rounded-3xl font-black text-2xl shadow-xl active:scale-95 uppercase">Print labels</button>
    </div>
  </div>

  <div id="pn-area" class="print-area active"></div>
  <div id="bag-area" class="print-area"></div>

  <script>
    function formatThaiDate(dateStr) {
      if (!dateStr) return "-";
      const d = new Date(dateStr);
      const months = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
      return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear() + 543}`;
    }

    function selectSection(type) {
      document.querySelectorAll('.print-area').forEach(el => el.classList.remove('active'));
      document.getElementById(`${type}-area`).classList.add('active');
      document.querySelectorAll('.bg-white').forEach(el => el.style.borderColor = '#ecfdf5');
      document.getElementById(`card-${type}`).style.borderColor = '#10b981'; 
    }

    function splitProductName(name) {
      if (!name) return "";
      if (name.includes(' ml / ')) {
        const match = name.match(/(\d{1,3}(,\d{3})* ml \/ \d+ kcal)/);
        if (match) {
          const spec = match[0];
          const pName = name.replace(spec, '').trim();
          return `<span>${pName}</span><br><span style="font-size: 0.8em; font-weight: 800;">${spec}</span>`;
        }
      }
      return `<span>${name}</span>`;
    }

    function renderLabels() {
      const params = new URLSearchParams(window.location.search);
      const o = {};
      params.forEach((value, key) => { o[key] = value; });

      if (!o.hn) return;

      const expDate = new Date(o.orderDate);
      expDate.setDate(expDate.getDate() + 1);

      const allRows = [];
      const addRow = (label, val) => { if (val && parseFloat(val) > 0) allRows.push({label, val}); };
      
      addRow(o.productName, o.productVol);
      addRow('Addamel-N', o.addamel);
      addRow(o.vitType === 'soluvit' ? 'Soluvit-N' : '◆ Cernevit ◆', o.vitVol);
      addRow('B-Complex', o.bco);
      addRow('Vitalipid-N Adult', o.vitalipid);
      addRow(o.other1Name, o.other1Vol);
      addRow(o.other2Name, o.other2Vol);
      addRow(o.other3Name, o.other3Vol);
      addRow(o.other4Name, o.other4Vol);

      const qty = parseInt(o.quantity) || 1;
      const routeLabel = (o.route || "").includes('Central') ? 'C-line' : 'P-line';
      let pnHTML = '';

      for (let i = 1; i <= qty; i++) {
        let tableBody = '';
        let currentTotalVol = 0;
        let displayRows = [];

        if (i === 1) {
          displayRows = allRows;
          currentTotalVol = o.totalVol;
        } else {
          displayRows = [allRows[0]];
          currentTotalVol = allRows[0].val; 
        }

        displayRows.forEach((row, index) => {
          let labelText = index === 0 ? splitProductName(row.label) : row.label;
          tableBody += `<tr><td>${index + 1}. ${labelText}</td><td class="text-right">${row.val}</td></tr>`;
        });

        const modeClass = displayRows.length <= 4 ? 'large-mode' : 'compact-mode';

        pnHTML += `
          <div class="sticker sticker-pn ${modeClass}">
            <div class="header-info flex justify-between items-baseline" contenteditable="true">
              <span style="white-space: nowrap; text-overflow: ellipsis; padding-top: 4px; padding-bottom: 4px;">${o.hn} ${o.patientName}</span>
              <span class="font-bold text-black flex-shrink-0 ml-1">${i}/${qty}</span>
            </div>
            <div class="flex justify-between text-[14px] font-bold mb-1" contenteditable="true">
              <span>Ward: ${o.ward}</span>
              <span>Route: ${routeLabel}</span>
            </div>
            
            <div class="table-container">
              <table class="pn-table">
                <thead>
                  <tr style="background:#fff !important;">
                    <th style="text-align:left; background:#fff !important;">รายการสารอาหาร</th>
                    <th style="width:30%; background:#fff !important;">ปริมาตร (ml)</th>
                  </tr>
                </thead>
                <tbody contenteditable="true">
                  ${tableBody}
                  <tr style="background:#fff !important; font-weight:800;">
                    <td class="text-right" style="vertical-align: middle; padding: 4px 6px; background:#fff !important;">Total Volume (ml)</td>
                    <td class="text-right" style="vertical-align: middle; padding: 4px 6px; background:#fff !important;">${currentTotalVol}</td>
                  </tr>
                </tbody>
              </table>
            </div>

            <div class="footer-container" contenteditable="true">
              <div class="energy-text">Energy: ${o.productKcal} kcal</div>
              <div class="text-right flex flex-col items-end">
                <div class="rate-box mb-1">Rate: ${o.rate} ml/hr</div>
                <div class="exp-text">หมดอายุ ${formatThaiDate(expDate)}<br>เวลา 18:00 น.</div>
              </div>
            </div>
          </div>
        `;
      }
      document.getElementById('pn-area').innerHTML = pnHTML;
      document.getElementById('mode-hint').innerText = qty > 1 ? `✨ MULTI-BAG MODE (${qty} bags)` : `✨ SINGLE BAG MODE`;

      document.getElementById('bag-area').innerHTML = `
        <div class="sticker sticker-pn flex flex-col items-center justify-center text-center" style="width:3.75in; height:2.48in; padding:1.4cm 0.25in 0.1in 0.25in; background: #fff !important;" contenteditable="true">
          <div style="font-size: 46px; font-weight: 900; line-height: 1;">${o.ward}</div>
          <div style="border-top: 4px solid #000; border-bottom: 4px solid #000; width: 100%; padding: 8px 0; margin: 6px 0;">
           <span style="font-size: 22px; font-weight: 900; display: block; line-height: 1.4; white-space: nowrap; text-overflow: ellipsis; padding-top: 4px; padding-bottom: 4px;">${o.patientName}</span>
          </div>
        <div style="font-size: 22px; font-weight: 800; margin-bottom: 4px; margin-top: -1.5mm;">${o.hn}</div>
          <div style="font-size: 16px; font-weight: 700;">เตรียมวันที่: ${formatThaiDate(o.orderDate)}</div>
          <div style="font-size: 15px; font-weight: 800; color: #000; margin-top: 6px; padding-bottom: 8px;">(เก็บในตู้เย็น 2-8° C)</div>
        </div>
      `;
    }
    window.onload = renderLabels;
  </script>
</body>
</html>
